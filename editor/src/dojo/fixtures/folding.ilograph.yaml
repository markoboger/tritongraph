description: |
  Dojo fixture for focus and folding behavior. A nested system with a few directed dependencies
  so we can click in and out of containers and assert the view stays stable.

resources:
  - name: system
    children:
      - name: domain
        children:
          - name: aggregate-users
          - name: aggregate-orders
      - name: adapters
        children:
          - name: rest-api
          - name: worker-sync

perspectives:
  - name: dependencies
    orientation: leftToRight
    relations:
      - from: rest-api
        to: aggregate-users
        label: depends on
      - from: worker-sync
        to: aggregate-orders
        label: depends on
      - from: aggregate-orders
        to: aggregate-users
        label: depends on
