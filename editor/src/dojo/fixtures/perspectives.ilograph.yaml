description: |
  Dojo fixture for explicit perspective selection through the URL. The same resources expose two
  different relation sets so reloading with ?perspective=... must restore the intended view.

resources:
  - name: ui
  - name: app
  - name: domain
  - name: db

perspectives:
  - id: dependencies
    name: dependencies
    orientation: leftToRight
    relations:
      - from: ui
        to: app
        label: depends on
      - from: app
        to: domain
        label: depends on
      - from: domain
        to: db
        label: depends on
  - id: runtime-view
    name: Runtime View
    orientation: leftToRight
    relations:
      - from: ui
        to: app
        label: calls
      - from: app
        to: domain
        label: creates
