description: |
  Dojo fixture for relation filters. Several labels are present so Playwright can verify that the
  top-bar checkboxes hide and show the corresponding edge sets consistently.

resources:
  - name: foundation
  - name: traits
  - name: services
  - name: entrypoint

perspectives:
  - name: dependencies
    orientation: leftToRight
    relations:
      - from: services
        to: foundation
        label: depends on
      - from: entrypoint
        to: services
        label: depends on
      - from: services
        to: traits
        label: with
      - from: entrypoint
        to: foundation
        label: gets
