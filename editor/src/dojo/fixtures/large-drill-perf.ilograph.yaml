    orientation: leftToRight
    color: royalblue
    notes: |
      Click any module to focus it (it expands to fill its column). Shift-click a sibling
      to pin it alongside the focused module. With 60 nodes and ~40 region participants, the
      fix #7 reduction from O(n×k) to O(n+k) pin checks makes each drill-in ~8× faster.
