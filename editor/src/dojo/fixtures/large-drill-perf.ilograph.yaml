description: |
  Large fintech-platform monorepo — 60 modules across 5 dependency layers.

  Purpose: stress-test the drill-in interaction. Clicking any module expands it to fill
  its column; the runtime must classify every sibling, determine which columns contain
  pinned modules, and hide the rest. At this scale fix #7 (O(n×k) → O(n+k) pin checks)
  makes the drill-in visibly snappier: ~60 nodes × ~40 region participants drops from
  ~7 µs to ~0.8 µs per drill call.

  Architecture: a layered sbt monorepo for a hypothetical fintech product.
    Depth 0 — core libraries (no deps inside the diagram)
    Depth 1 — platform layer (depends on core)
    Depth 2 — domain model (depends on platform)
    Depth 3 — services (depends on domain)
    Depth 4 — gateways + workers (depends on services)

  Try clicking a module to focus it, then Shift-click another to pin it alongside.

resources:
  # depth 0 — core (10)
  - name: core-types
    subtitle: shared value types and enumerations
  - name: core-utils
    subtitle: collection helpers and retry logic
  - name: core-crypto
    subtitle: hashing, signing, key derivation
  - name: core-db
    subtitle: JDBC pool + migration runner
  - name: core-http
    subtitle: HTTP client + server primitives
  - name: core-queue
    subtitle: message broker abstractions
  - name: core-metrics
    subtitle: Prometheus instrumentation
  - name: core-tracing
    subtitle: OpenTelemetry span helpers
  - name: core-config
    subtitle: typesafe-config + environment binding
  - name: core-testing
    subtitle: shared test fixtures and generators

  # depth 1 — platform (12)
  - name: platform-auth
    subtitle: JWT issuance + token validation
  - name: platform-cache
    subtitle: Redis client with circuit breaker
  - name: platform-rate-limit
    subtitle: sliding-window rate limiter
  - name: platform-audit
    subtitle: immutable audit-log writer
  - name: platform-feature-flags
    subtitle: LaunchDarkly + static fallback
  - name: platform-storage
    subtitle: S3-compatible object store client
  - name: platform-event-bus
    subtitle: Kafka producer + consumer wrappers
  - name: platform-scheduler
    subtitle: distributed cron + one-shot tasks
  - name: platform-search
    subtitle: Elasticsearch query builder
  - name: platform-notify-client
    subtitle: push, email and SMS dispatch gateway
  - name: platform-secrets
    subtitle: Vault dynamic-secret leasing
  - name: platform-idempotency
    subtitle: request deduplication via Redis

  # depth 2 — domain (12)
  - name: domain-accounts
    subtitle: user profile, KYC state machine
  - name: domain-wallet
    subtitle: multi-currency balance ledger
  - name: domain-cards
    subtitle: card issuance and controls
  - name: domain-payments
    subtitle: payment intent + charge lifecycle
  - name: domain-transfers
    subtitle: internal and external fund moves
  - name: domain-fx
    subtitle: FX rate feed and conversion engine
  - name: domain-loans
    subtitle: credit underwriting and repayment
  - name: domain-compliance
    subtitle: AML screening and sanctions checks
  - name: domain-reporting
    subtitle: regulatory report aggregations
  - name: domain-fraud
    subtitle: real-time fraud signal scoring
  - name: domain-disputes
    subtitle: chargeback and dispute workflow
  - name: domain-rewards
    subtitle: cashback and points accumulation

  # depth 3 — services (14)
  - name: svc-onboarding
    subtitle: new-customer registration flow
  - name: svc-auth
    subtitle: login, MFA and session management
  - name: svc-accounts
    subtitle: profile reads + KYC orchestration
  - name: svc-cards
    subtitle: card lifecycle REST API
  - name: svc-payments
    subtitle: payment intake + routing
  - name: svc-transfers
    subtitle: transfer initiation + status
  - name: svc-fx
    subtitle: rate quotes and conversion
  - name: svc-loans
    subtitle: loan origination + servicing
  - name: svc-compliance
    subtitle: continuous screening daemon
  - name: svc-fraud
    subtitle: decision engine + case management
  - name: svc-disputes
    subtitle: dispute intake and resolution
  - name: svc-rewards
    subtitle: points ledger and redemption
  - name: svc-reporting
    subtitle: statement and report generation
  - name: svc-notifications
    subtitle: event-driven user messaging

  # depth 4 — gateways and workers (11)
  - name: gw-mobile-api
    subtitle: public REST API for mobile clients
  - name: gw-web-api
    subtitle: BFF for the web dashboard
  - name: gw-partner-api
    subtitle: B2B integration surface
  - name: gw-admin-api
    subtitle: internal operations console
  - name: worker-settlement
    subtitle: daily settlement batch
  - name: worker-reconcile
    subtitle: ledger vs. processor reconciliation
  - name: worker-regulatory
    subtitle: automated regulatory filings
  - name: worker-fraud-retrain
    subtitle: ML model retraining pipeline
  - name: worker-notify-dispatch
    subtitle: fan-out notification delivery
  - name: worker-rewards-calc
    subtitle: periodic cashback calculation
  - name: triton-root
    subtitle: sbt root — aggregates all subprojects

perspectives:
