<?xml version="1.0" encoding="UTF-8"?>
<!--
  Running container  shipping-container silhouette (process + writable layer), not the Docker logo.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" aria-hidden="true">
  <g stroke="#0f172a" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <rect x="32" y="68" width="136" height="76" rx="10" ry="10" fill="#cbd5e1" />
    <line x1="62" y1="68" x2="62" y2="144" stroke="#0f172a" />
    <line x1="100" y1="68" x2="100" y2="144" stroke="#0f172a" />
    <line x1="138" y1="68" x2="138" y2="144" stroke="#0f172a" />
    <!-- door / access panel -->
    <rect x="148" y="92" width="14" height="28" rx="2" fill="#f8fafc" stroke="#0f172a" stroke-width="4" />
    <!-- status dot -->
    <circle cx="48" cy="54" r="8" fill="#22c55e" stroke="#0f172a" stroke-width="4" />
  </g>
</svg>
