server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Avoid stale SPA shell after deploy (otherwise users keep an old index.html that never loads new JS).
  location = /index.html {
    add_header Cache-Control "no-store" always;
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
