description: >-
  sbt build: 03-cross-build-and-config

  **from** = dependent module, **to** = depended-on module (`dependsOn`) or aggregated child
  (`aggregate`).

  See https://ilograph.com/docs/spec

  Source: `sbt-examples/03-cross-build-and-config/build.sbt`
resources:
  - name: root
    subtitle: .
  - name: lib213
    subtitle: lib
  - name: app
    subtitle: app
perspectives:
  - name: dependencies
    orientation: leftToRight
    color: royalblue
    notes: Relations from sbt `.dependsOn` / `.aggregate` (subset parser; not a full Scala AST).
    relations:
      - from: root
        to: lib213
        label: aggregates
      - from: root
        to: app
        label: aggregates
      - from: app
        to: lib213
        label: depends on
