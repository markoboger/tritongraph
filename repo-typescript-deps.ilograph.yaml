    subtitle: 0 imports scanned
  - id: packages/triton-vscode-extension
    name: packages/triton-vscode-extension
    subtitle: 0 imports scanned
  - id: tools/sbt-to-ilograph
    name: tools/sbt-to-ilograph
    subtitle: 0 imports scanned
  - id: tools/ts-to-ilograph
    name: tools/ts-to-ilograph
    subtitle: 0 imports scanned
  - id: sbt-examples
    name: sbt-examples
    subtitle: example build.sbt inputs
  - id: scala-examples
    name: scala-examples
    subtitle: example Scala workspaces (sbt)
perspectives:
  - name: typescript imports
    relations:
      - from: editor
        to: packages/triton-core
        label: imports
  - name: sbt correspondence
