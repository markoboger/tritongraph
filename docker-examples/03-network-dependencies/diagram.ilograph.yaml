description: "Built images per service, network internal, depends_on worker to api."
resources:
  - name: docker-examples-03-api:local
    subtitle: image
    x-triton-icon: image
    x-triton-project-compartments:
      - id: df
        title: dockerfile
        rows:
          - { value: "api/Dockerfile → FROM alpine:3.20" }
  - name: docker-examples-03-worker:local
    subtitle: image
    x-triton-icon: image
    x-triton-project-compartments:
      - id: df
        title: dockerfile
        rows:
          - { value: "worker/Dockerfile → FROM alpine:3.20" }
  - name: internal
    subtitle: network
    x-triton-icon: network
    x-triton-project-compartments:
      - id: d
        title: compose
        rows:
          - { value: "driver: bridge" }
  - name: api
    subtitle: service
    x-triton-icon: service
    x-triton-project-compartments:
      - id: n
        title: networks
        rows:
          - { value: "internal" }
  - name: worker
    subtitle: service
    x-triton-icon: service
    x-triton-project-compartments:
      - id: dep
        title: depends_on
        rows:
          - { value: "api" }
      - id: n
        title: networks
        rows:
          - { value: "internal" }
perspectives:
  - name: dependencies
    orientation: leftToRight
    color: royalblue
    relations:
      - from: docker-examples-03-api:local
        to: api
        label: image
      - from: docker-examples-03-worker:local
        to: worker
        label: image
      - from: worker
        to: api
        label: depends_on
      - from: api
        to: internal
        label: networks
      - from: worker
        to: internal
        label: networks
