description: "Built app/db images, volumes db-data and app-cache, network app-net, port on app."
resources:
  - name: docker-examples-04-app:local
    subtitle: image
    x-triton-icon: image
    x-triton-project-compartments:
      - id: df
        title: dockerfile
        rows:
          - { value: "app/Dockerfile → FROM alpine:3.20" }
  - name: docker-examples-04-db:local
    subtitle: image
    x-triton-icon: image
    x-triton-project-compartments:
      - id: df
        title: dockerfile
        rows:
          - { value: "db/Dockerfile → FROM postgres:16-alpine" }
  - name: app-net
    subtitle: network
    x-triton-icon: network
  - name: db-data
    subtitle: volume
    x-triton-icon: volume
  - name: app-cache
    subtitle: volume
    x-triton-icon: volume
  - name: db
    subtitle: service
    x-triton-icon: database
    x-triton-project-compartments:
      - id: v
        title: volumes
        rows:
          - { value: "db-data → /var/lib/postgresql/data" }
  - name: app
    subtitle: service
    x-triton-icon: service
    x-triton-project-compartments:
      - id: p
        title: ports
        rows:
          - { value: "18082:8080" }
      - id: v
        title: volumes
        rows:
          - { value: "app-cache → /tmp/cache" }
      - id: d
        title: depends_on
        rows:
          - { value: "db" }
perspectives:
  - name: dependencies
    orientation: leftToRight
    color: royalblue
    relations:
      - from: app
        to: docker-examples-04-app:local
        label: image
      - from: db
        to: docker-examples-04-db:local
        label: image
      - from: db
        to: db-data
        label: volumes
      - from: app
        to: app-cache
        label: volumes
      - from: app
        to: db
        label: depends_on
      - from: app
        to: app-net
        label: networks
      - from: db
        to: app-net
        label: networks
